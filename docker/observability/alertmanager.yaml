global:
  resolve_timeout: 5m

route:
  receiver: feishu-adapter
  group_by: ["alertname", "severity", "category"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity="critical"
      receiver: feishu-adapter
      group_wait: 10s
      repeat_interval: 30m

receivers:
  - name: feishu-adapter
    webhook_configs:
      - url: http://host.docker.internal:5040/internal/alerts/feishu
        send_resolved: true
